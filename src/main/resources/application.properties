spring.application.name=social-media-backend

# ==============================================================
# Database Configuration (PostgreSQL)
# ==============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================================================
# JWT Configuration
# ==============================================================
jwt.secret=${JWT_SECRET}

jwt.expiration=86400000

# ==============================================================
# Mail Configuration (Spring Mail)
# These settings are optional. If you don't have an SMTP server,
# the application will still run, but emails won't be sent.
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.connectiontimeout=5000
spring.mail.properties.mail.timeout=3000
spring.mail.properties.mail.writetimeout=5000

# Server Port
server.port=8080 
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=social-media

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB


# ==============================================================
# Security & Error Handling
# ==============================================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
