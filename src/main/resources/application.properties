# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Supabase
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=social-media

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Email sender branding
# From address shown to recipients (Gmail SMTP sends on their behalf)
app.mail.display-name=${APP_MAIL_DISPLAY_NAME:FriendsHub}
app.mail.from-address=${APP_MAIL_FROM:noreply@friendshub.me}
app.mail.reply-to=${APP_MAIL_REPLY_TO:support@friendshub.me}

# Verification and reset link base URLs (no trailing slash)
app.verification-url=${APP_VERIFICATION_URL:https://friendshub.me/verify}
app.reset-password-url=${APP_RESET_PASSWORD_URL:https://friendshub.me/reset-password}

# Rate Limiting
app.ratelimit.requests-per-minute=60
app.ratelimit.per-user.requests-per-minute=30
app.ratelimit.global.requests-per-minute=1000

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Error handling
server.error.include-stacktrace=never
server.error.include-message=never

# Resilience4j
resilience4j.circuitbreaker.instances.chatService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.chatService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.chatService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.notificationService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.notificationService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notificationService.waitDurationInOpenState=10s

# Cache
spring.cache.type=simple

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
